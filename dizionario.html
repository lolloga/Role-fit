<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoleFit — Dizionario dei ruoli</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dizionario-page">
  <div class="container">

    <!-- Ricerca -->
    <div class="search-area">
      <div class="label" style="margin-bottom:8px;">Dizionario</div>
      <h2>Cosa fa davvero<br>quel ruolo?</h2>
      <p>Scrivi un job title o incolla un annuncio. Ricevi una spiegazione in linguaggio umano.</p>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Es. Product Manager, Key Account, Policy Officer..."
          autocomplete="off"
        />
        <button class="btn btn--primary" id="search-btn" onclick="searchRole()">
          Cerca
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div class="thinking hidden" id="diz-loading">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Sto cercando...</span>
    </div>

    <!-- Risultato -->
    <div id="diz-result" class="hidden dizionario-result"></div>

  </div>
</div>

<script src="js/dizionario.js"></script>
</body>
</html>
