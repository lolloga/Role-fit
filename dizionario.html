<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoleFit — Dizionario dei ruoli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="blob-container">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<a href="index.html" class="nav-home">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
    <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Home
</a>

<div class="dizionario-page">
  <div class="container">

    <div class="search-area" style="padding-top:40px;">
      <div class="label" style="margin-bottom:10px;">Dizionario</div>
      <h2>Cosa fa davvero<br><em style="font-style:italic;color:var(--emerald-light);">quel ruolo?</em></h2>
      <p style="margin-top:10px;margin-bottom:24px;">Scrivi un job title o incolla un annuncio. Ricevi una spiegazione in linguaggio umano — cosa fa davvero, con chi lavora, come si entra, quanto guadagna.</p>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Es. Product Manager, Key Account, Policy Officer..."
          autocomplete="off"
        />
        <button class="btn btn--primary" onclick="searchRole()">Cerca →</button>
      </div>
    </div>

    <div class="ai-thinking hidden" id="diz-loading" style="padding:40px 0;">
      <div class="ai-orb">
        <div class="ai-orb-ring2"></div>
        <div class="ai-orb-ring"></div>
        <div class="ai-orb-core"></div>
        <div class="ai-orb-particles">
          <div class="ai-particle"></div>
          <div class="ai-particle"></div>
          <div class="ai-particle"></div>
        </div>
      </div>
      <div class="ai-thinking-phrases">Sto cercando...</div>
    </div>

    <div id="diz-result" class="hidden dizionario-result"></div>

  </div>
</div>

<script src="js/dizionario.js"></script>
</body>
</html>
