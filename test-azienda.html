<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoleFit per le aziende — Descrivi il ruolo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="site-nav">
  <div class="container--wide">
    <a href="index.html" class="site-nav-logo" onclick="localStorage.removeItem('rf_azienda_state')">RoleFit</a>
    <div class="site-nav-links">
      <a href="index.html#come-funziona">Come funziona il test</a>
      <a href="dizionario.html">Dizionario dei ruoli</a>
      <a href="chi-siamo.html">Chi siamo</a>
    </div>
    <a href="account.html" class="site-nav-cta" id="site-nav-cta">Il tuo profilo</a>
  </div>
</nav>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
</div>
<div class="test-page">
  <div class="container">
    <div class="test-header">
      <div class="test-logo">RoleFit — Aziende</div>
      <div class="phase-indicator">
        <div class="phase-dot active" id="dot-1"></div>
        <div class="phase-dot" id="dot-2"></div>
        <div class="phase-dot" id="dot-3"></div>
        <span class="phase-label" id="phase-label">Raccontaci il ruolo</span>
      </div>
    </div>
    <div class="question-area" id="question-area">
      <div class="ai-thinking hidden" id="thinking-state">
        <div class="ai-orb">
          <div class="ai-orb-ring2"></div>
          <div class="ai-orb-ring"></div>
          <div class="ai-orb-core"></div>
          <div class="ai-orb-particles">
            <div class="ai-particle"></div>
            <div class="ai-particle"></div>
            <div class="ai-particle"></div>
          </div>
        </div>
        <div class="ai-thinking-phrases" id="thinking-phrase">Sto elaborando...</div>
      </div>
      <div id="active-question" class="hidden">
        <div class="question-text" id="question-text"></div>
        <div class="question-context hidden" id="question-context"></div>
        <div id="question-input"></div>
      </div>
    </div>
  </div>
</div>
<script src="js/test-azienda.js"></script>
<script type="module" src="js/site-nav.js"></script>
</body>
</html>
