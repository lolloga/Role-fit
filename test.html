<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoleFit — Il test</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="test-page">
  <div class="container">

    <!-- Header -->
    <div class="test-header">
      <div class="test-logo">RoleFit</div>
      <div class="phase-indicator">
        <div class="phase-dot active" id="dot-1"></div>
        <div class="phase-dot" id="dot-2"></div>
        <div class="phase-dot" id="dot-3"></div>
        <div class="phase-dot" id="dot-4"></div>
        <span class="phase-label" id="phase-label">Stiamo costruendo il tuo profilo</span>
      </div>
    </div>

    <!-- Area domanda -->
    <div class="question-area" id="question-area">

      <!-- Stato: thinking -->
      <div class="thinking hidden" id="thinking-state">
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
        <span>Un momento...</span>
      </div>

      <!-- Domanda attiva -->
      <div id="active-question" class="hidden">
        <div class="question-text" id="question-text"></div>
        <div id="question-input"></div>
        <button class="back-btn" id="back-btn" onclick="goBack()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Torna indietro
        </button>
      </div>

      <!-- Attività interattive -->
      <div id="activity-area" class="hidden"></div>

    </div>

  </div>
</div>

<script src="js/test.js"></script>
</body>
</html>
